<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>合約電子簽署</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .sign-wrap { max-width: 720px; margin: 0 auto; padding: 16px; }
    .contract-body {
      white-space: pre-wrap; line-height: 1.7; font-size: 15px;
      max-height: 46vh; overflow-y: auto; border: 1px solid var(--line, #dde5e3);
      border-radius: 10px; padding: 16px; background: #fff;
    }
    .sigpad {
      width: 100%; height: 200px; border: 1px dashed #9bb3ae; border-radius: 10px;
      background: #fff; touch-action: none; display: block;
    }
    .sig-hint { font-size: 12px; color: #6b7c79; margin: 4px 2px; }
    .signed-banner { text-align: center; padding: 30px 16px; }
    .signed-banner .tick { font-size: 44px; color: var(--primary, #2a7f78); }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand" id="brand">合約電子簽署</div>
  </header>
  <main class="content" style="margin-left:0">
    <div class="sign-wrap" id="root">
      <div class="empty">載入中…</div>
    </div>
  </main>
  <script src="/js/api.js"></script>
  <script src="/js/sign.js"></script>
</body>
</html>
